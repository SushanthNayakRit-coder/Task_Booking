<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<head></head>
<body>
<section th:fragment="section">
    <h1>Create Task / Booking</h1>
    <form id="taskForm" class="task-form">
        <label for="title">Title *</label>
        <input type="text" id="title" name="title" required/>
        <label for="description">Description</label>
        <textarea id="description" name="description" rows="4"></textarea>
        <label for="dateTime">Date / Time *</label>
        <input type="datetime-local" id="dateTime" name="dateTime" required/>
        <label for="priority">Priority *</label>
        <select id="priority" name="priority" required>
            <option value="LOW">Low</option>
            <option value="MEDIUM" selected>Medium</option>
            <option value="HIGH">High</option>
            <option value="URGENT">Urgent</option>
        </select>
        <label for="assignedUserId">Assigned User *</label>
        <select id="assignedUserId" name="assignedUserId" required>
            <option value="">-- Select user --</option>
        </select>
        <div class="form-actions">
            <button type="submit">Create Task</button>
            <a th:href="@{/tasks}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
    <div id="formMessage"></div>
</section>
</body>
</html>
